<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central de Redes Sociais</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #0f172a;
      color: #ffffff;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .header-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 30px;
      width: 100%;
      max-width: 1200px;
    }

    /* Abas de Navegação */
    .tabs-container {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      justify-content: center;
      width: 100%;
      max-width: 1200px;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      padding: 12px 25px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .tab-btn:hover {
      background: #334155;
      color: #ffffff;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: #ffffff;
      border-color: #60a5fa;
      box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
    }

    /* Título com letras EXTRA GRANDES */
    h1 {
      font-size: 5rem;
      font-weight: 900;
      color: #f8fafc;
      text-shadow: 0 8px 20px rgba(0,0,0,0.6);
      margin-bottom: 15px;
      text-align: center;
      letter-spacing: 2px;
      line-height: 1;
      transition: color 0.3s ease;
    }

    .footer-area {
      margin-top: 50px;
      padding-top: 25px;
      border-top: 1px solid #1e293b;
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }

    /* Seção dos Desenvolvedores no Rodapé */
    .developer-info {
      font-size: 0.9rem;
      color: #64748b;
      text-align: center;
      line-height: 1.6;
    }

    /* Links do e-mail e WhatsApp em BRANCO */
    .developer-info a {
      color: #ffffff; 
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .developer-info a:hover {
      color: #e2e8f0;
      text-decoration: underline;
    }

    /* Destaque em BRANCO para o nome do desenvolvedor */
    .dev-name {
      color: #ffffff;
      font-weight: bold;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      width: 100%;
      max-width: 1200px;
    }

    .card {
      border-radius: 20px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      min-height: 220px;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-decoration: none;
      color: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    }

    .card h2 {
      font-size: 2.2rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    .card p {
      font-size: 1.3rem;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.25);
      padding: 10px 20px;
      border-radius: 30px;
      margin-top: 15px;
    }

    /* Cores das Redes Sociais Padrão e Novas */
    .grad-youtube   { background: linear-gradient(135deg, #ff0000, #cc0000); }
    .grad-whatsapp  { background: linear-gradient(135deg, #25d366, #128c7e); }
    .grad-facebook  { background: linear-gradient(135deg, #1877f2, #0d52b1); }
    .grad-instagram { background: linear-gradient(135deg, #f09433, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888); }
    .grad-telegram  { background: linear-gradient(135deg, #0088cc, #005580); }
    .grad-tiktok    { background: linear-gradient(135deg, #00f2fe, #4facfe, #ff0050); }
    .grad-kwai      { background: linear-gradient(135deg, #ff8c00, #ff4500); }
    .grad-twitter   { background: linear-gradient(135deg, #1da1f2, #0c85d0); }
    .grad-linkedin  { background: linear-gradient(135deg, #0a66c2, #004182); }
    .grad-pinterest { background: linear-gradient(135deg, #bd081c, #8c0613); }
    .grad-threads   { background: linear-gradient(135deg, #262626, #000000); }
    .grad-discord   { background: linear-gradient(135deg, #5865f2, #404eed); }
    .grad-twitch    { background: linear-gradient(135deg, #9146ff, #772ce8); }

    /* Cores das Lojas e Sites */
    .grad-magalu       { background: linear-gradient(135deg, #0086ff, #0048b3); }
    .grad-mercadolivre { background: linear-gradient(135deg, #ffe600, #ffcc00); color: #000 !important; }
    .grad-casasbahia   { background: linear-gradient(135deg, #0042da, #002277); }
    .grad-amazon       { background: linear-gradient(135deg, #ff9900, #e68a00); color: #000 !important; }
    .grad-shopee       { background: linear-gradient(135deg, #ee4d2d, #c73211); }
    .grad-americanas   { background: linear-gradient(135deg, #e60014, #99000d); }
    .grad-shein        { background: linear-gradient(135deg, #222222, #000000); }
    .grad-aliexpress   { background: linear-gradient(135deg, #ff4747, #cc0000); }
    .grad-centauro     { background: linear-gradient(135deg, #ff6600, #cc5200); }
    .grad-netshoes     { background: linear-gradient(135deg, #ff6600, #b84700); }

    /* Cores de IPTV */
    .grad-iptv         { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }

    /* Janelas Popups */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-content {
      background: #1e293b;
      padding: 35px;
      border-radius: 25px;
      max-width: 650px;
      width: 100%;
      text-align: center;
      position: relative;
      border: 3px solid #38bdf8;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-content h3 {
      font-size: 2.2rem;
      margin-bottom: 15px;
    }

    .modal-content p {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: #cbd5e1;
    }

    .btn-abrir {
      display: inline-block;
      padding: 15px 30px;
      font-size: 1.4rem;
      font-weight: bold;
      color: #fff;
      background: #3b82f6;
      border-radius: 50px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-abrir:hover {
      background: #2563eb;
    }

    .fechar {
      position: absolute;
      top: 15px; right: 20px;
      font-size: 2.5rem;
      color: #94a3b8;
      cursor: pointer;
    }

    .fechar:hover {
      color: #ffffff;
    }

    /* Ajuste para telas menores */
    @media (max-width: 768px) {
      h1 {
        font-size: 3.2rem;
      }
    }
  </style>
</head>
<body>

  <!-- Abas de Navegação -->
  <div class="tabs-container">
    <button class="tab-btn active" onclick="mudarAba('redes')">📱 Redes Sociais</button>
    <button class="tab-btn" onclick="mudarAba('lojas')">🛒 Lojas e Sites</button>
    <button class="tab-btn" onclick="mudarAba('iptv')">📺 IPTV</button>
  </div>

  <div class="header-area">
    <h1 id="tituloCentral">Central de Redes Sociais</h1>
  </div>

  <div class="grid-container" id="gridRedes">
    <!-- Bloco dinâmico preenchido por JavaScript -->
  </div>

  <div class="footer-area">
    <!-- Informações dos Desenvolvedores -->
    <div class="developer-info">
      Desenvolvedor: <strong class="dev-name">Irlan</strong><br>
      E-mail: <a href="mailto:iranjuniormax@gmail.com">iranjuniormax@gmail.com</a><br>
      WhatsApp 🇧🇷: <a href="https://wa.me/5569992535201" target="_blank">+55 69 99253-5201</a>
    </div>
  </div>

  <!-- Janela Modal do Usuário -->
  <div id="modalJanela" class="modal">
    <div class="modal-content">
      <span class="fechar" onclick="fecharJanela()">&times;</span>
      <h3 id="modalTitulo">Rede Social</h3>
      <p id="modalTexto">Descrição da rede social selecionada.</p>
      <a id="modalLink" href="#" target="_blank" class="btn-abrir">Ir para o site</a>
    </div>
  </div>

  <script>
    // Aba Ativa Atual
    let abaAtual = 'redes';

    // Dados Padrão (Redes Sociais)
    const redes = [
      { id: 'youtube',   nome: 'YouTube',   estilo: 'grad-youtube',   corCustom: '#ff0000', link: 'https://youtube.com',     descricao: 'Assista a vídeos, tutoriais e transmissões ao vivo.' },
      { id: 'whatsapp',  nome: 'WhatsApp',  estilo: 'grad-whatsapp',  corCustom: '#25d366', link: 'https://web.whatsapp.com', descricao: 'Envie mensagens e faça chamadas com seus amigos.' },
      { id: 'facebook',  nome: 'Facebook',  estilo: 'grad-facebook',  corCustom: '#1877f2', link: 'https://facebook.com',     descricao: 'Conecte-se com amigos e compartilhe momentos.' },
      { id: 'instagram', nome: 'Instagram', estilo: 'grad-instagram', corCustom: '#e6683c', link: 'https://instagram.com',    descricao: 'Veja fotos, reels e stories do seu dia a dia.' },
      { id: 'telegram',  nome: 'Telegram',  estilo: 'grad-telegram',  corCustom: '#0088cc', link: 'https://web.telegram.org', descricao: 'Mensagens rápidas, grupos e canais de notícias.' },
      { id: 'tiktok',    nome: 'TikTok',    estilo: 'grad-tiktok',    corCustom: '#00f2fe', link: 'https://tiktok.com',      descricao: 'Assista a vídeos curtos, tendências e dancinhas.' },
      { id: 'kwai',      nome: 'Kwai',      estilo: 'grad-kwai',      corCustom: '#ff8c00', link: 'https://kwai.com',        descricao: 'Vídeos curtos e divertidos para todos os momentos.' },
      { id: 'twitter',   nome: 'X (Twitter)', estilo: 'grad-twitter', corCustom: '#1da1f2', link: 'https://twitter.com',       descricao: 'Acompanhe as notícias de última hora e discussões globais.' },
      { id: 'linkedin',  nome: 'LinkedIn',  estilo: 'grad-linkedin',  corCustom: '#0a66c2', link: 'https://linkedin.com',     descricao: 'Sua rede profissional para conexões de carreira e vagas.' },
      { id: 'pinterest', nome: 'Pinterest', estilo: 'grad-pinterest', corCustom: '#bd081c', link: 'https://pinterest.com',    descricao: 'Encontre ideias criativas, inspirações e receitas.' },
      { id: 'threads',   nome: 'Threads',   estilo: 'grad-threads',   corCustom: '#262626', link: 'https://www.threads.net',  descricao: 'Compartilhe ideias e conversas em texto com o público.' },
      { id: 'discord',   nome: 'Discord',   estilo: 'grad-discord',   corCustom: '#5865f2', link: 'https://discord.com',      descricao: 'Comunidades, chats de voz e servidores de jogos.' },
      { id: 'twitch',    nome: 'Twitch',    estilo: 'grad-twitch',    corCustom: '#9146ff', link: 'https://twitch.tv',        descricao: 'Plataforma líder em transmissões ao vivo de games e criadores.' }
    ];

    // Dados Padrão (Lojas e Sites)
    const lojas = [
      { id: 'magalu',       nome: 'Magalu',        estilo: 'grad-magalu',       corCustom: '#0086ff', link: 'https://www.magazineluiza.com.br', descricao: 'Ofertas em eletrodomésticos, tecnologia e móveis.' },
      { id: 'mercadolivre', nome: 'Mercado Livre', estilo: 'grad-mercadolivre', corCustom: '#ffe600', link: 'https://www.mercadolivre.com.br', descricao: 'O maior marketplace da América Latina com frete grátis.' },
      { id: 'casasbahia',   nome: 'Casas Bahia',   estilo: 'grad-casasbahia',   corCustom: '#0042da', link: 'https://www.casasbahia.com.br',   descricao: 'Tudo em móveis, celulares, eletrodomésticos e utilidades.' },
      { id: 'amazon',       nome: 'Amazon',        estilo: 'grad-amazon',       corCustom: '#ff9900', link: 'https://www.amazon.com.br',       descricao: 'Livros, eletrônicos, casa e assinaturas Prime.' },
      { id: 'shopee',       nome: 'Shopee',        estilo: 'grad-shopee',       corCustom: '#ee4d2d', link: 'https://shopee.com.br',           descricao: 'Milhares de itens com descontos e cupons diários.' },
      { id: 'americanas',   nome: 'Americanas',    estilo: 'grad-americanas',   corCustom: '#e60014', link: 'https://www.americanas.com.br',   descricao: 'Tudo o que você precisa em tecnologia, casa e lazer.' },
      { id: 'shein',        nome: 'Shein',         estilo: 'grad-shein',        corCustom: '#222222', link: 'https://www.shein.com.br',        descricao: 'Moda feminina, masculina, infantil e acessórios com ótimos preços.' },
      { id: 'aliexpress',   nome: 'AliExpress',    estilo: 'grad-aliexpress',   corCustom: '#ff4747', link: 'https://www.netflix.com',       descricao: 'Variedade imensa de produtos importados, eletrônicos e mais.' },
      { id: 'centauro',     nome: 'Centauro',      estilo: 'grad-centauro',     corCustom: '#ff6600', link: 'https://www.centauro.com.br',     descricao: 'Artigos esportivos, tênis, camisas de time e acessórios.' },
      { id: 'netshoes',     nome: 'Netshoes',      estilo: 'grad-netshoes',     corCustom: '#b84700', link: 'https://www.netshoes.com.br',     descricao: 'Esporte, moda e lazer com as melhores marcas do mercado.' }
    ];

    // Dados Padrão (IPTV)
    const iptv = [
      { id: 'iptv1', nome: 'Site iptv', estilo: 'grad-iptv', corCustom: '#7c3aed', link: 'https://www.netflix.com',         descricao: 'Acesse nosso site oficial iptv.' }
    ];

    // Configurações de Título por Aba
    const configRedes = { texto: "Central de Redes Sociais", cor: "#f8fafc" };
    const configLojas = { texto: "Lojas e Sites", cor: "#f8fafc" };
    const configIptv  = { texto: "IPTV", cor: "#f8fafc" };

    // Mudar de Aba
    function mudarAba(novaAba) {
      abaAtual = novaAba;
      
      const botoes = document.querySelectorAll('.tab-btn');
      botoes.forEach(btn => btn.classList.remove('active'));
      
      if (novaAba === 'redes') {
        botoes[0].classList.add('active');
      } else if (novaAba === 'lojas') {
        botoes[1].classList.add('active');
      } else if (novaAba === 'iptv') {
        botoes[2].classList.add('active');
      }

      renderizarGrid();
    }

    // Renderizar Tela Principal
    function renderizarGrid() {
      const h1Element = document.getElementById('tituloCentral');
      let configAtual;
      let itensAtuais;

      if (abaAtual === 'redes') {
        configAtual = configRedes;
        itensAtuais = redes;
      } else if (abaAtual === 'lojas') {
        configAtual = configLojas;
        itensAtuais = lojas;
      } else if (abaAtual === 'iptv') {
        configAtual = configIptv;
        itensAtuais = iptv;
      }

      h1Element.innerText = configAtual.texto;
      h1Element.style.color = configAtual.cor;
      document.title = configAtual.texto;

      const grid = document.getElementById('gridRedes');
      grid.innerHTML = '';

      itensAtuais.forEach((item) => {
        const card = document.createElement('div');
        card.className = `card ${item.estilo || ''}`;
        
        if (item.corCustom) {
          card.style.background = item.corCustom;
        }

        card.onclick = () => abrirJanela(item.nome, item.link, item.descricao);
        card.innerHTML = `
          <h2>${item.nome}</h2>
          <p>Clique para abrir</p>
        `;
        grid.appendChild(card);
      });
    }

    // Modal do Usuário
    function abrirJanela(nome, link, descricao) {
      document.getElementById('modalTitulo').innerText = nome;
      document.getElementById('modalTexto').innerText = descricao;
      document.getElementById('modalLink').href = link;
      document.getElementById('modalJanela').style.display = 'flex';
    }

    function fecharJanela() {
      document.getElementById('modalJanela').style.display = 'none';
    }

    // Fechar ao clicar fora do modal
    window.onclick = function(event) {
      let modalJanela = document.getElementById('modalJanela');
      if (event.target === modalJanela) fecharJanela();
    }

    // Inicialização
    renderizarGrid();
  </script>

</body>
</html>
